; Dev-oriented PHP config for the OpenCart 3.0.x reference environment.
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
max_input_vars = 5000

; OpenCart 3 on PHP 7.4 is noisy with deprecations/notices — keep real errors
; visible for extension development but silence the legacy-core noise.
display_errors = On
display_startup_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE & ~E_STRICT
log_errors = On

; Required by OpenCart.
file_uploads = On
session.auto_start = 0

date.timezone = UTC
