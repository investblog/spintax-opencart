name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine-tests:
    name: Engine kernel tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # OpenCart 3.0.5.0 requires PHP 8.1+; test the floor and a current 8.x.
        php: ['8.1', '8.3']
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, xml, iconv, tokenizer
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('extension/composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit -c phpunit.xml.dist

      # KernelLoadsTest proves the shipped tree matches the PIN. Nothing proved the pin matches the
      # latest release — and a pre-1.0 caret cannot cross a minor, so `^0.1` silently held this port
      # a whole version behind and it missed the BCS plural release entirely. That shipped: sr/hr/bs
      # rendered fullwidth-braced wreckage in v0.2.6 with every test green.
      #
      # Advisory on purpose. A hard failure would turn every upstream release into a red build here
      # before anyone has decided to take it, which trains people to ignore the signal. This makes
      # the gap visible in the job summary instead.
      - name: Is the engine pin behind its latest release?
        continue-on-error: true
        run: |
          set -euo pipefail
          pinned=$(composer show spintax/core --format=json | php -r 'echo json_decode(stream_get_contents(STDIN), true)["versions"][0];')
          latest=$(composer show spintax/core --available --format=json | php -r '$d=json_decode(stream_get_contents(STDIN),true); echo $d["latest"] ?? $d["versions"][0];')
          echo "pinned: $pinned   latest: $latest"
          if [ "$pinned" != "$latest" ]; then
            echo "::warning title=Engine pin is behind::spintax/core is pinned at $pinned but $latest is released. Bump the constraint in extension/composer.json, run 'composer run sync-kernel', and read that release's changelog before shipping."
            echo "### ⚠️ Engine pin is behind" >> "$GITHUB_STEP_SUMMARY"
            echo "\`spintax/core\` pinned **$pinned**, latest **$latest**." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ✅ Engine pin is current ($pinned)" >> "$GITHUB_STEP_SUMMARY"
          fi
